name: Sync Upstream

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync-upstream:
    if: github.repository == 'atlascodesai/cmux-atlas'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SYNC_BRANCH: sync/upstream-main
      UPSTREAM_REMOTE_URL: https://github.com/manaflow-ai/cmux.git
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch origin and upstream
        run: |
          set -euo pipefail
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream "$UPSTREAM_REMOTE_URL"
          else
            git remote add upstream "$UPSTREAM_REMOTE_URL"
          fi

          git fetch origin main
          git fetch upstream main

      - name: Merge upstream into sync branch
        id: merge
        run: |
          set -euo pipefail

          git checkout -B "$SYNC_BRANCH" origin/main

          if ! git merge --no-edit upstream/main; then
            echo "merge_conflict=true" >> "$GITHUB_OUTPUT"
            {
              echo "## Upstream Sync"
              echo
              echo "Automatic merge from \`upstream/main\` into \`origin/main\` hit conflicts."
              echo "Resolve manually by merging \`upstream/main\` into \`main\`."
            } >> "$GITHUB_STEP_SUMMARY"
            git merge --abort || true
            exit 1
          fi

          if git diff --quiet origin/main...HEAD; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Upstream Sync"
              echo
              echo "No new upstream changes to sync."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          {
            echo "## Upstream Sync"
            echo
            echo "Prepared sync branch \`$SYNC_BRANCH\` from \`origin/main\` merged with \`upstream/main\`."
            echo
            echo "- origin/main: \`$(git rev-parse origin/main)\`"
            echo "- upstream/main: \`$(git rev-parse upstream/main)\`"
            echo "- merge head: \`$(git rev-parse HEAD)\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Push sync branch
        if: steps.merge.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git push --force-with-lease origin "$SYNC_BRANCH"

      - name: Create or update pull request
        if: steps.merge.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          cat > /tmp/upstream-sync-pr-body.md <<'EOF'
          Automated upstream sync PR.

          This branch was created by merging `upstream/main` into the fork's `main`.

          Review focus:
          - merge conflicts or semantic drift in fork-specific files
          - CI status on the merged result
          - submodule or workflow changes from upstream
          EOF

          existing_pr_number="$(gh pr list \
            --head "$SYNC_BRANCH" \
            --base main \
            --json number \
            --jq '.[0].number // ""')"

          if [[ -n "$existing_pr_number" ]]; then
            gh pr edit "$existing_pr_number" \
              --title "chore: sync upstream/main into fork main" \
              --body-file /tmp/upstream-sync-pr-body.md
          else
            gh pr create \
              --base main \
              --head "$SYNC_BRANCH" \
              --title "chore: sync upstream/main into fork main" \
              --body-file /tmp/upstream-sync-pr-body.md
          fi
